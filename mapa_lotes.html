.splash{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;transition:opacity 0.5s}
.splash.hide{opacity:0;pointer-events:none}
.s-msg{font-size:13px;color:#94a3b8;min-height:20px;text-align:center}
.s-bar{width:220px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden}
.s-fill{height:100%;background:#3b82f6;border-radius:2px;width:0%;transition:width 0.4s}

function pintar(est){
  const ov=$('ov'); ov.innerHTML='';
  const img=$('mapimg');
  const iw=img.offsetWidth, ih=img.offsetHeight;
  const r=Math.max(5, Math.min(9, iw*0.007));
  const diam=r*2;
  for(const[lot,c]of Object.entries(PIN_COORDS)){
    const s=est[+lot]||'DISPONIBLE';
    if(s==='DISPONIBLE') continue;
    const cls=s==='VENDIDO'?'v':s==='RESERVADO'?'r':'p';
    const px=c[0]/100*iw, py=c[1]/100*ih;
    const el=document.createElement('div');
    el.className='pin '+cls;
    el.style.cssText=`left:${px}px;top:${py}px;width:${diam}px;height:${diam}px;`;
    el.title='Lote '+lot+' — '+s;
    ov.appendChild(el);
  }
}

async function init(){
  const a=anim(); let rows;
  try{const r=await fetch(API);rows=await r.json();}
  catch(e){await a;$('smsg').innerHTML='⚠️ Sin conexión';return;}
  await a; setP(100,'✅ ¡Listo!'); await sleep(450);
  $('splash').classList.add('hide');
  const est={};let v=0,r=0,p=0,d=0;
  rows.forEach(row=>{
    const n=parseInt(row['NRO LOTE']);
    const s=String(row['SITUACIÓN']||row['SITUACION']||'').toUpperCase().trim();
    if(n)est[n]=s;
    if(s==='VENDIDO')v++;else if(s==='RESERVADO')r++;else if(s==='PREVENTA')p++;else if(s==='DISPONIBLE')d++;
  });
  const img=$('mapimg');
  const doPaint=()=>{
    pintar(est);
    $('lc').innerHTML=`<span style="color:#ef4444;font-weight:600">${v}</span><span style="color:#94a3b8"> vend.</span>&nbsp;<span style="color:#f59e0b;font-weight:600">${r}</span><span style="color:#94a3b8"> res.</span>&nbsp;<span style="color:#8b5cf6;font-weight:600">${p}</span><span style="color:#94a3b8"> prev.</span>&nbsp;<span style="color:#64748b;font-weight:600">${d}</span><span style="color:#94a3b8"> disp.</span>`;
    const now=new Date();
    $('upd').textContent='Actualizado: '+now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    $('sbar').textContent=rows.length+' lotes · '+v+' vendidos · '+r+' reservados · '+p+' preventa · '+d+' disponibles';
  };
  if(img.complete&&img.offsetWidth>0) doPaint(); else img.onload=doPaint;
  window.addEventListener('resize',()=>{ if(Object.keys(est).length) pintar(est); });
}
init();
